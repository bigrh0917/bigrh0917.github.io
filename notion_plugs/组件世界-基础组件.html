  <style type="text/css">
    .chart-container {
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Oxygen, Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue, sans-serif
    }

    .chart-container .axis,
    .chart-container .chart-label {
      fill: #555b51
    }

    .chart-container .axis line,
    .chart-container .chart-label line {
      stroke: #dadada
    }

    .chart-container .dataset-units circle {
      stroke: #fff;
      stroke-width: 2
    }

    .chart-container .dataset-units path {
      fill: none;
      stroke-opacity: 1;
      stroke-width: 2px
    }

    .chart-container .dataset-path {
      stroke-width: 2px
    }

    .chart-container .path-group path {
      fill: none;
      stroke-opacity: 1;
      stroke-width: 2px
    }

    .chart-container line.dashed {
      stroke-dasharray: 5, 3
    }

    .chart-container .axis-line .specific-value {
      text-anchor: start
    }

    .chart-container .axis-line .y-line {
      text-anchor: end
    }

    .chart-container .axis-line .x-line {
      text-anchor: middle
    }

    .chart-container .legend-dataset-text {
      fill: #6c7680;
      font-weight: 600
    }

    .graph-svg-tip {
      position: absolute;
      z-index: 99999;
      padding: 10px;
      font-size: 12px;
      color: #959da5;
      text-align: center;
      background: rgba(0, 0, 0, .8);
      border-radius: 3px
    }

    .graph-svg-tip ol,
    .graph-svg-tip ul {
      padding-left: 0;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex
    }

    .graph-svg-tip ul.data-point-list li {
      min-width: 90px;
      -webkit-box-flex: 1;
      -ms-flex: 1;
      flex: 1;
      font-weight: 600
    }

    .graph-svg-tip strong {
      color: #dfe2e5;
      font-weight: 600
    }

    .graph-svg-tip .svg-pointer {
      position: absolute;
      height: 5px;
      margin: 0 0 0 -5px;
      content: " ";
      border: 5px solid transparent;
      border-top-color: rgba(0, 0, 0, .8)
    }

    .graph-svg-tip.comparison {
      padding: 0;
      text-align: left;
      pointer-events: none
    }

    .graph-svg-tip.comparison .title {
      display: block;
      padding: 10px;
      margin: 0;
      font-weight: 600;
      line-height: 1;
      pointer-events: none
    }

    .graph-svg-tip.comparison ul {
      margin: 0;
      white-space: nowrap;
      list-style: none
    }

    .graph-svg-tip.comparison li {
      display: inline-block;
      padding: 5px 10px
    }
  </style>
  <style>
    /*定义滚动条高宽及背景
 高宽分别对应横竖滚动条的尺寸*/
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
      background-color: #F5F5F500;
    }

    /*定义滚动条轨道
 内阴影+圆角*/
    ::-webkit-scrollbar-track {
      -webkit-box-shadow: inset 0 0 6px rgba(0, 0, 0, 0);
      border-radius: 10px;
      background-color: #F5F5F500;
    }

    /*定义滑块
 内阴影+圆角*/
    ::-webkit-scrollbar-thumb {
      border-radius: 10px;
      -webkit-box-shadow: inset 0 0 6px rgba(0, 0, 0, .3);
      background-color: #555;
    }
  </style>
